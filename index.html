
<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PaymentSys" />
    <link rel="manifest" href="/manifest.json" />
    <title>سیستم مدیریت پرداخت</title>
    
    <script>
      // Apply cached settings immediately for better PWA feel
      try {
        const settings = JSON.parse(localStorage.getItem('app_settings') || '{}');
        if (settings.appName) {
          document.title = settings.appName;
          const appleTitle = document.querySelector('meta[name="apple-mobile-web-app-title"]');
          if (appleTitle) appleTitle.setAttribute('content', settings.appName);
        }
        if (settings.pwaIcon) {
          const appleIcon = document.querySelector('link[rel="apple-touch-icon"]');
          if (appleIcon) appleIcon.setAttribute('href', settings.pwaIcon);
        }
      } catch (e) {}
    </script>

    <!-- Dynamic Page Size Style Placeholder -->
    <style id="page-size-style"></style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW Registered!', reg.scope))
            .catch(err => console.log('SW Failed', err));
        });
      }
    </script>
  </body>
</html>
